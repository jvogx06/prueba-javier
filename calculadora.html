<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calc {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      color: #a0aec0;
      font-size: 14px;
      min-height: 20px;
      word-break: break-all;
    }

    .display .result {
      color: #e2e8f0;
      font-size: 32px;
      font-weight: 300;
      word-break: break-all;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 18px 0;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.1s, filter 0.1s;
    }

    button:active { transform: scale(0.93); }

    .btn-num {
      background: #1a365d;
      color: #e2e8f0;
    }

    .btn-num:hover { filter: brightness(1.3); }

    .btn-op {
      background: #2b6cb0;
      color: #fff;
    }

    .btn-op:hover { filter: brightness(1.2); }

    .btn-eq {
      background: #e53e3e;
      color: #fff;
    }

    .btn-eq:hover { filter: brightness(1.15); }

    .btn-clear {
      background: #744210;
      color: #fbd38d;
    }

    .btn-clear:hover { filter: brightness(1.2); }

    .btn-del {
      background: #2d3748;
      color: #fc8181;
    }

    .btn-del:hover { filter: brightness(1.3); }

    .span2 { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calc">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear span2" onclick="clearAll()">AC</button>
      <button class="btn-del" onclick="deleteLast()">⌫</button>
      <button class="btn-op" onclick="append('%')">%</button>

      <button class="btn-num" onclick="append('7')">7</button>
      <button class="btn-num" onclick="append('8')">8</button>
      <button class="btn-num" onclick="append('9')">9</button>
      <button class="btn-op" onclick="append('÷')">÷</button>

      <button class="btn-num" onclick="append('4')">4</button>
      <button class="btn-num" onclick="append('5')">5</button>
      <button class="btn-num" onclick="append('6')">6</button>
      <button class="btn-op" onclick="append('×')">×</button>

      <button class="btn-num" onclick="append('1')">1</button>
      <button class="btn-num" onclick="append('2')">2</button>
      <button class="btn-num" onclick="append('3')">3</button>
      <button class="btn-op" onclick="append('-')">−</button>

      <button class="btn-num span2" onclick="append('0')">0</button>
      <button class="btn-num" onclick="append('.')">.</button>
      <button class="btn-op" onclick="append('+')">+</button>

      <button class="btn-eq span2" onclick="calculate()">=</button>
      <button class="btn-op span2" onclick="toggleSign()">+/−</button>
    </div>
  </div>

  <script>
    let expression = '';
    let justCalculated = false;

    const exprEl = document.getElementById('expression');
    const resultEl = document.getElementById('result');

    function updateDisplay() {
      exprEl.textContent = expression;
      resultEl.textContent = expression || '0';
    }

    function append(val) {
      const ops = ['+', '-', '×', '÷', '%'];
      const isOp = ops.includes(val);

      if (justCalculated) {
        if (isOp) {
          // continue from result
          expression = resultEl.textContent + val;
        } else {
          expression = val;
        }
        justCalculated = false;
        updateDisplay();
        return;
      }

      // Prevent duplicate operators
      if (isOp && expression && ops.includes(expression.slice(-1))) {
        expression = expression.slice(0, -1);
      }

      // Prevent leading operator (except minus for negatives)
      if (isOp && !expression && val !== '-') return;

      // Prevent multiple dots in the same number
      if (val === '.') {
        const parts = expression.split(/[+\-×÷%]/);
        if (parts[parts.length - 1].includes('.')) return;
      }

      expression += val;
      updateDisplay();
    }

    function clearAll() {
      expression = '';
      justCalculated = false;
      exprEl.textContent = '';
      resultEl.textContent = '0';
    }

    function deleteLast() {
      if (justCalculated) { clearAll(); return; }
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function calculate() {
      if (!expression) return;
      try {
        const raw = expression
          .replace(/×/g, '*')
          .replace(/÷/g, '/')
          .replace(/(\d+)%/g, '($1/100)');

        // eslint-disable-next-line no-new-func
        let value = Function('"use strict"; return (' + raw + ')')();

        if (!isFinite(value)) { resultEl.textContent = 'Error'; expression = ''; return; }

        value = parseFloat(value.toPrecision(12));
        exprEl.textContent = expression + ' =';
        resultEl.textContent = value;
        expression = String(value);
        justCalculated = true;
      } catch {
        resultEl.textContent = 'Error';
        expression = '';
      }
    }

    function toggleSign() {
      if (!expression) return;
      if (justCalculated) {
        const v = parseFloat(resultEl.textContent);
        if (isNaN(v)) return;
        expression = String(-v);
        resultEl.textContent = -v;
        exprEl.textContent = '';
        return;
      }
      // Toggle sign of last number in expression
      expression = expression.replace(/([\d.]+)$/, (m) => String(-parseFloat(m)));
      updateDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') append(e.key);
      else if (e.key === '.') append('.');
      else if (e.key === '+') append('+');
      else if (e.key === '-') append('-');
      else if (e.key === '*') append('×');
      else if (e.key === '/') { e.preventDefault(); append('÷'); }
      else if (e.key === '%') append('%');
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') deleteLast();
      else if (e.key === 'Escape') clearAll();
    });
  </script>
</body>
</html>
